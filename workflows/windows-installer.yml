name: Windows Installer CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - work
    tags:
      - 'v*'
  pull_request:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project directory
        id: detect
        shell: pwsh
        run: |
          $workspace = $env:GITHUB_WORKSPACE
          Write-Host "Workspace: $workspace"

          # Fast path: project at repository root
          $rootScript = Join-Path $workspace 'scripts\build.ps1'
          if (Test-Path $rootScript) {
            $projectDir = $workspace
          } else {
            # Fallback: nested project directory
            $candidate = Get-ChildItem -Path $workspace -Recurse -File -Filter build.ps1 -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match '[\\/]scripts[\\/]build\.ps1$' } |
              Sort-Object FullName |
              Select-Object -First 1

            if (-not $candidate) {
              Write-Host "Checked for build scripts under workspace. Top-level entries:"
              Get-ChildItem -Path $workspace | Select-Object Name, FullName | Format-Table -AutoSize
              Write-Error "Could not find scripts/build.ps1 under $workspace"
              exit 1
            }

            $projectDir = Split-Path -Parent (Split-Path -Parent $candidate.FullName)
            Write-Host "Detected nested build script: $($candidate.FullName)"
          }

          "PROJECT_DIR=$projectDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "project_dir=$projectDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Detected project dir: $projectDir"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:USERPROFILE 'vcpkg'
          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release + installer
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_DIR"
          .\scripts\build.ps1 -Installer

      - name: Verify installer exists
        shell: pwsh
        run: |
          $installerPattern = Join-Path $env:PROJECT_DIR 'build\installer\*.exe'
          $installer = Get-ChildItem -Path $installerPattern -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Error "Installer was not produced under $installerPattern"
            exit 1
          }
          Write-Host "Installer output:"
          $installer | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocVision-setup-x64
          path: ${{ steps.detect.outputs.project_dir }}/build/installer/*.exe
          if-no-files-found: error

      - name: Publish installer to GitHub Release
        if: (startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release') && github.event_name != 'pull_request'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.detect.outputs.project_dir }}/build/installer/*.exe
