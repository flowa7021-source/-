name: Windows Installer CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project directory
        shell: pwsh
        run: |
          $buildScript = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter build.ps1 -File -Recurse |
            Where-Object { $_.FullName -match '[\\/]scripts[\\/]build\.ps1$' } |
            Sort-Object FullName |
            Select-Object -First 1

          if (-not $buildScript) {
            Write-Error "Could not find scripts/build.ps1 under $env:GITHUB_WORKSPACE"
            exit 1
          }

          $projectDir = Split-Path -Parent (Split-Path -Parent $buildScript.FullName)
          "PROJECT_DIR=$projectDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Detected build script: $($buildScript.FullName)"
          Write-Host "Detected project dir: $projectDir"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:USERPROFILE 'vcpkg'
          if (-not (Test-Path $vcpkgRoot)) {
            git clone https://github.com/microsoft/vcpkg.git "$vcpkgRoot"
          }
          & "$vcpkgRoot\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release + installer
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_DIR"
          .\scripts\build.ps1 -Installer

      - name: Verify installer exists
        shell: pwsh
        run: |
          $installerPattern = Join-Path $env:PROJECT_DIR 'build\installer\*.exe'
          $installer = Get-ChildItem -Path $installerPattern -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Error "Installer was not produced under $installerPattern"
            exit 1
          }
          Write-Host "Installer output:"
          $installer | ForEach-Object { Write-Host " - $($_.FullName)" }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocVision-setup-x64
          path: ${{ env.PROJECT_DIR }}/build/installer/*.exe
          if-no-files-found: error

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_DIR }}/build/installer/*.exe
