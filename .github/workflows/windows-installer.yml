name: Windows Installer CI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect project directory
        id: project
        shell: pwsh
        run: |
          $candidate = Get-ChildItem -Path $env:GITHUB_WORKSPACE -Directory |
            Where-Object { Test-Path (Join-Path $_.FullName 'scripts\build.ps1') } |
            Select-Object -First 1

          if (-not $candidate) {
            Write-Error "Could not find project directory containing scripts/build.ps1"
          }

          "PROJECT_DIR=$($candidate.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "project_dir=$($candidate.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Detected project dir: $($candidate.FullName)"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat"
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build release + installer
        shell: pwsh
        run: |
          Set-Location "$env:PROJECT_DIR"
          .\scripts\build.ps1 -Installer

      - name: Verify installer exists
        shell: pwsh
        run: |
          $installerPattern = Join-Path $env:PROJECT_DIR 'build\installer\*.exe'
          $installer = Get-ChildItem -Path $installerPattern -ErrorAction SilentlyContinue
          if (-not $installer) {
            Write-Error "Installer was not produced under $installerPattern"
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocVision-setup-x64
          path: ${{ env.PROJECT_DIR }}/build/installer/*.exe
          if-no-files-found: error

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.PROJECT_DIR }}/build/installer/*.exe
